<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宠安·阿福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F5F5; max-width: 420px; margin: 0 auto; min-height: 100vh; }
.header { padding: 20px 20px 15px; background: linear-gradient(135deg, #4CAF50, #66BB6A); }
.headerTitle { font-size: 22px; font-weight: bold; color: #fff; }
.headerSubtitle { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px; }
.content { padding: 16px; }
.petCard { background: #fff; border-radius: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
.petInfo { display: flex; align-items: center; }
.avatar { width: 60px; height: 60px; border-radius: 30px; background: #E8F5E9; display: flex; justify-content: center; align-items: center; margin-right: 14px; font-size: 26px; font-weight: bold; color: #4CAF50; }
.petName { font-size: 20px; font-weight: bold; color: #333; }
.petBreed { font-size: 13px; color: #999; margin-top: 3px; }
.healthScore { text-align: center; }
.scoreLabel { font-size: 11px; color: #999; }
.scoreValue { font-size: 28px; font-weight: bold; color: #4CAF50; }
.scoreBar { width: 60px; height: 4px; background: #E0E0E0; border-radius: 2px; margin-top: 4px; }
.scoreFill { width: 92%; height: 100%; background: #4CAF50; border-radius: 2px; }
.statsRow { display: flex; gap: 6px; margin-bottom: 20px; }
.statCard { background: #fff; border-radius: 12px; padding: 12px; text-align: center; flex: 1; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.statIcon { font-size: 20px; }
.statValue { font-size: 14px; font-weight: bold; color: #333; margin-top: 6px; }
.statLabel { font-size: 11px; color: #999; margin-top: 2px; }
.sectionTitle { font-size: 17px; font-weight: bold; color: #333; margin-bottom: 12px; }
.menuItem { display: flex; align-items: center; background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); cursor: pointer; transition: transform 0.1s; }
.menuItem:active { transform: scale(0.98); }
.menuIconWrap { width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-right: 14px; font-size: 22px; }
.menuText { flex: 1; }
.menuTitle { font-size: 16px; font-weight: 600; color: #333; }
.menuSubtitle { font-size: 12px; color: #999; margin-top: 2px; }
.menuArrow { font-size: 24px; color: #999; }
.insuranceCard { background: #E8F5E9; border-radius: 16px; padding: 18px; margin-bottom: 16px; border-left: 4px solid #4CAF50; }
.insuranceTitle { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 10px; }
.insuranceRow { display: flex; justify-content: space-between; align-items: center; }
.insuranceName { font-size: 15px; font-weight: 600; color: #333; }
.insurancePrice { font-size: 18px; font-weight: bold; color: #4CAF50; }
.insuranceDesc { font-size: 13px; color: #999; margin: 4px 0 12px; }
.insuranceBtn { background: #4CAF50; border-radius: 8px; padding: 10px; text-align: center; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
.insuranceBtn:active { opacity: 0.8; }
.bottomNav { display: flex; background: #fff; padding: 8px 0 20px; border-top: 1px solid #E8E8E8; position: sticky; bottom: 0; }
.navItem { flex: 1; text-align: center; cursor: pointer; }
.navIcon { font-size: 22px; opacity: 0.5; }
.navIconActive { opacity: 1; }
.navLabel { font-size: 11px; color: #999; margin-top: 2px; }
.navLabelActive { color: #4CAF50; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <div class="headerTitle">宠安·阿福</div>
  <div class="headerSubtitle">奶糖的健康管家</div>
</div>
<div class="content">
  <div class="petCard">
    <div class="petInfo">
      <div class="avatar">奶</div>
      <div>
        <div class="petName">奶糖</div>
        <div class="petBreed">英短 · 3岁 · 猫</div>
      </div>
    </div>
    <div class="healthScore">
      <div class="scoreLabel">健康分</div>
      <div class="scoreValue">92</div>
      <div class="scoreBar"><div class="scoreFill"></div></div>
    </div>
  </div>
  <div class="statsRow">
    <div class="statCard"><div class="statIcon">🌡️</div><div class="statValue">38.5°C</div><div class="statLabel">体温</div></div>
    <div class="statCard"><div class="statIcon">❤️</div><div class="statValue">120次/分</div><div class="statLabel">心率</div></div>
    <div class="statCard"><div class="statIcon">⚖️</div><div class="statValue">4.2kg</div><div class="statLabel">体重</div></div>
    <div class="statCard"><div class="statIcon">🦷</div><div class="statValue">已做</div><div class="statLabel">驱虫</div></div>
  </div>
  <div class="sectionTitle">常用功能</div>
  <div class="menuItem"><div class="menuIconWrap" style="background:rgba(76,175,80,0.12)">💬</div><div class="menuText"><div class="menuTitle">AI问诊</div><div class="menuSubtitle">24小时在线问诊</div></div><div class="menuArrow">›</div></div>
  <div class="menuItem"><div class="menuIconWrap" style="background:rgba(33,150,243,0.12)">🏥</div><div class="menuText"><div class="menuTitle">找医院</div><div class="menuSubtitle">附近宠物医院</div></div><div class="menuArrow">›</div></div>
  <div class="menuItem"><div class="menuIconWrap" style="background:rgba(255,112,67,0.12)">🛡️</div><div class="menuText"><div class="menuTitle">宠物保险</div><div class="menuSubtitle">医疗费用报销</div></div><div class="menuArrow">›</div></div>
  <div class="menuItem"><div class="menuIconWrap" style="background:rgba(156,39,176,0.12)">📋</div><div class="menuText"><div class="menuTitle">健康档案</div><div class="menuSubtitle">疫苗·体检记录</div></div><div class="menuArrow">›</div></div>
  <div class="menuItem"><div class="menuIconWrap" style="background:rgba(255,152,0,0.12)">🛒</div><div class="menuText"><div class="menuTitle">阿福药房</div><div class="menuSubtitle">处方粮·药品</div></div><div class="menuArrow">›</div></div>
  <div class="menuItem"><div class="menuIconWrap" style="background:rgba(0,188,212,0.12)">👥</div><div class="menuText"><div class="menuTitle">毛孩社群</div><div class="menuSubtitle">交流·分享</div></div><div class="menuArrow">›</div></div>
  <div class="insuranceCard">
    <div class="insuranceTitle">🛡️ 推荐保险方案</div>
    <div class="insuranceRow"><div class="insuranceName">基础版</div><div class="insurancePrice">¥299/年</div></div>
    <div class="insuranceDesc">门诊+住院报销，单次最高¥1500</div>
    <div class="insuranceBtn">了解详情</div>
  </div>
</div>
<div class="bottomNav">
  <div class="navItem"><div class="navIcon navIconActive">🏠</div><div class="navLabel navLabelActive">首页</div></div>
  <div class="navItem"><div class="navIcon">💬</div><div class="navLabel">问诊</div></div>
  <div class="navItem"><div class="navIcon">📋</div><div class="navLabel">档案</div></div>
  <div class="navItem"><div class="navIcon">👤</div><div class="navLabel">我的</div></div>
</div>
</body>
</html>
